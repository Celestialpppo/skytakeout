server:
  port: 8080

spring:
  profiles:
    active: dev
  main:
    allow-circular-references: true
  datasource:
    druid:
      driver-class-name: ${sky.datasource.driver-class-name}
      url: jdbc:mysql://${sky.datasource.host}:${sky.datasource.port}/${sky.datasource.database}?serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=utf-8&zeroDateTimeBehavior=convertToNull&useSSL=false&allowPublicKeyRetrieval=true
      username: ${sky.datasource.username}
      password: ${sky.datasource.password}
      validation-query: SELECT 1   # 用来检测连接是否有效的sql
      test-while-idle: true  # 如果空闲时间大于timeBetweenEvictionRunsMillis，执行validationQuery检测连接是否有效
      initial-size: 1  # 初始化时建立物理连接的个数
      min-idle: 1  # 即使超过空闲时间也不会被回收
      max-active: 8 # 最大连接数
      min-evictable-idle-time-millis: 300000 # 当空闲时间达到5分钟回收连接
      time-between-eviction-runs-millis: 60000 # 每过1分钟执行1次空闲检测

  redis:
    host: ${sky.data.redis.host}
    port: ${sky.data.redis.port}
    database: ${sky.data.redis.database}
    password: ${sky.data.redis.password}
    lettuce:
      pool:
        min-idle: 1
        max-active: 10
        max-idle: 5
        max-wait: -1ms
  # Elasticsearch 连接配置（用于全文检索）
  elasticsearch:
    uris: ${sky.elasticsearch.uris:http://localhost:9200}
    username: ${sky.elasticsearch.username:}
    password: ${sky.elasticsearch.password:}
  # RabbitMQ 连接配置（用于 Canal 增量消息解耦）
  rabbitmq:
    host: ${sky.rabbitmq.host:localhost}
    port: ${sky.rabbitmq.port:5672}
    username: ${sky.rabbitmq.username:guest}
    password: ${sky.rabbitmq.password:guest}
    virtual-host: ${sky.rabbitmq.virtual-host:/}
    listener:
      simple:
        acknowledge-mode: auto
        prefetch: 10
        default-requeue-rejected: false #表示监听器抛异常后，默认不重回队列。
    publisher-confirm-type: correlated
    publisher-returns: true


mybatis:
  #mapper配置文件
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.sky.entity
  configuration:
    #开启驼峰命名
    map-underscore-to-camel-case: true

logging:
  level:
    com:
      sky:
        mapper: debug
        service: info
        controller: info

sky:
  jwt:
    # 设置jwt签名加密时使用的秘钥
    admin-secret-key: itcast
    # 设置jwt过期时间
    admin-ttl: 7200000
    # 设置前端传递过来的令牌名称
    admin-token-name: token
    user-secret-key: aslkdsajdlkjhdsfb
    user-ttl: 7200000
    user-token-name: authentication
  alioss:
    access-key-id: ${sky.alioss.access-key-id}
    access-key-secret: ${sky.alioss.access-key-secret}
    bucket-name: ${sky.alioss.bucket-name}
    endpoint: ${sky.alioss.endpoint}
    region: ${sky.alioss.region}
  wechat:
    appid: ${sky.wechat.appid}
    secret: ${sky.wechat.secret}
    mchid: ${sky.wechat.mchid}
    mch-serial-no: ${sky.wechat.mch-serial-no}
    private-key-file-path: ${sky.wechat.private-key-file-path}
    api-v3-key: ${sky.wechat.api-v3-key}
    we-chat-pay-cert-file-path: ${sky.wechat.private-key-file-path}
    notify-url: ${sky.wechat.notify-url}
    refund-notify-url: ${sky.wechat.refund-notify-url}
  baidu:
    ak: ${sky.baidu.ak}
    location-url: ${sky.baidu.location-url}
    distance-url: ${sky.baidu.distance-url}
  shop:
    location:
      lng: ${sky.shop.location.lng}
      lat: ${sky.shop.location.lat}
    limit-distance: ${sky.shop.limit-distance}
  order:
    timeout-minutes: 15
    delay-queue:
      enabled: true
      queue-name: order:timeout:close
      fallback-cron: "0 */30 * * * ?"
  cache:
    protection:
      enabled: true
      bloom:
        enabled: true
        category:
          expected-insertions: 10000
          false-probability: 0.01
        setmeal:
          expected-insertions: 10000
          false-probability: 0.01
      ttl:
        category-list-seconds: 1800
        dish-list-seconds: 1800
        setmeal-list-seconds: 1800
        setmeal-dish-seconds: 1800
        jitter-seconds: 300
        null-ttl-seconds: 120
  # 搜索模块开关与配置
  search:
    # 全文检索功能总开关
    enabled: true
    index:
      goods-index: goods_search
      auto-init-on-startup: true
      # 搜索接口每页最大数量，防止单次查询过大
      max-page-size: 50
    sync:
      # 增量同步开关：关闭时不启动 RabbitMQ 消费与 Canal 线程
      enabled: true
      exchange: search.sync.exchange
      queue: search.sync.queue
      dead-letter-exchange: search.sync.dlx
      dead-letter-queue: search.sync.dlq
      routing-key-dish: search.sync.dish
      routing-key-setmeal: search.sync.setmeal
      routing-key-category: search.sync.category
    canal:
      # Canal 客户端开关，依赖 sync.enabled=true
      enabled: true
      host: ${sky.canal.host:127.0.0.1}
      port: ${sky.canal.port:11111}
      destination: ${sky.canal.destination:example}
      username: ${sky.canal.username:}
      password: ${sky.canal.password:}
      # 订阅规则：数据库名.表名，按需调整数据库名
      filter: ${sky.canal.filter:.*\\.(dish|setmeal|category)}
      batch-size: ${sky.canal.batch-size:100}
      idle-sleep-ms: ${sky.canal.idle-sleep-ms:1000}
      error-sleep-ms: ${sky.canal.error-sleep-ms:3000}
