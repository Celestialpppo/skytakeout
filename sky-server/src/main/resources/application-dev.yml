sky:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    host: 127.0.0.1
    port: 3306
    database: sky_take_out
    username: root
    password: 18931226

  data:
    redis:
      host: 127.0.0.1
      port: 6379
      database: 0
      password: ""

  # application.yml 中 spring.elasticsearch.* 会引用这些值
  elasticsearch:
    uris: http://127.0.0.1:9200
    username: ""
    password: ""

  # application.yml 中 spring.rabbitmq.* 会引用这些值
  rabbitmq:
    host: 127.0.0.1
    port: 5672
    username: guest
    password: guest
    virtual-host: /

  # application.yml 中 sky.search.canal.* 会通过占位符读取这些值
  canal:
    host: 127.0.0.1
    port: 11111
    destination: example
    username: ""
    password: ""
    filter: "sky_take_out\\.(dish|setmeal|category)"
    batch-size: 100
    idle-sleep-ms: 1000
    error-sleep-ms: 3000

  alioss:
    access-key-id: "your_aliyun_access_key_id"
    access-key-secret: "your_aliyun_access_key_secret"
    bucket-name: "your_bucket_name"
    endpoint: "https://oss-cn-beijing.aliyuncs.com"
    region: "cn-beijing"

  wechat:
    appid: "your_wechat_appid"
    secret: "your_wechat_secret"
    mchid: "your_mchid"
    mch-serial-no: "your_mch_serial_no"
    private-key-file-path: "/path/to/apiclient_key.pem"
    api-v3-key: "your_api_v3_key"
    notify-url: "https://your-domain.com/user/paySuccessNotify"
    refund-notify-url: "https://your-domain.com/user/refundSuccessNotify"

  baidu:
    ak: "your_baidu_ak"
    location-url: "https://api.map.baidu.com/geocoding/v3"
    distance-url: "https://api.map.baidu.com/routematrix/v2/riding"

  shop:
    location:
      lng: 116.397128
      lat: 39.916527
    limit-distance: 5000

  # 全量联调模式：保持搜索链路开启
  search:
    enabled: true
    index:
      goods-index: goods_search
      auto-init-on-startup: true
      max-page-size: 50
    sync:
      enabled: true
      exchange: search.sync.exchange
      queue: search.sync.queue
      dead-letter-exchange: search.sync.dlx
      dead-letter-queue: search.sync.dlq
      routing-key-dish: search.sync.dish
      routing-key-setmeal: search.sync.setmeal
      routing-key-category: search.sync.category
    canal:
      enabled: true
